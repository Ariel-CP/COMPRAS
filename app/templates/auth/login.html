{% extends "base.html" %} {% block title %}Login{% endblock %} {% block content
%}
<div class="login-wrapper">
  <div class="login-card">
    <div class="login-brand">
      <img src="/static/favicon.svg" alt="logo" width="40" height="40" />
      <h2>Compras</h2>
    </div>
    <p class="hint">
      Accede con tu cuenta para gestionar planes, stock y precios.
    </p>
    <form id="login-form" style="margin-top: 12px">
      <div class="login-field">
        <label for="email">Email</label>
        <input
          class="login-input"
          type="email"
          id="email"
          name="email"
          required
        />
      </div>
      <div class="login-field">
        <label for="password">Contraseña</label>
        <input
          class="login-input"
          type="password"
          id="password"
          name="password"
          required
        />
      </div>
      <div
        class="login-field"
        style="display: flex; align-items: center; gap: 8px"
      >
        <label style="display: flex; align-items: center; gap: 6px"
          ><input type="checkbox" name="remember_me" id="remember_me" />
          Recuérdame</label
        >
        <a
          href="#"
          style="
            margin-left: auto;
            font-size: 13px;
            color: #6b7280;
            text-decoration: none;
          "
          >¿Olvidaste tu contraseña?</a
        >
      </div>
      <div class="login-actions">
        <button type="submit" class="btn-accion">Ingresar</button>
        <span id="login-status" class="login-status"></span>
      </div>
      <div class="login-footer">
        ¿Olvidaste tu contraseña? Contacta al administrador.
      </div>
    </form>
  </div>
</div>
{% endblock %} {% block scripts %}
<script>
  const form = document.getElementById("login-form");
  const statusEl = document.getElementById("login-status");
  const nextUrl = new URLSearchParams(window.location.search).get("next") || "/ui";

  function stringifyError(body) {
    if (!body) return "Error de login";
    if (typeof body === "string") return body;
    if (body.detail) {
      // detalle puede ser array de objetos {msg} o string
      const d = body.detail;
      if (typeof d === "string") return d;
      if (Array.isArray(d)) {
        return d
          .map((it) => {
            if (!it) return "";
            if (typeof it === "string") return it;
            if (it.msg) return it.msg;
            if (it.detail) return stringifyError(it.detail);
            return JSON.stringify(it);
          })
          .filter(Boolean)
          .join("; ");
      }
      return stringifyError(d);
    }
    if (body.message) return body.message;
    if (body.error) return body.error;
    if (Array.isArray(body)) return body.map((b) => stringifyError(b)).join("; ");
    if (typeof body === "object") {
      // Try to extract first meaningful string
      for (const k of ["non_field_errors", "errors", "_errors"]) {
        if (body[k]) return stringifyError(body[k]);
      }
      const vals = Object.values(body).flatMap((v) => (Array.isArray(v) ? v : [v]));
      const strVals = vals.map((v) => (typeof v === "string" ? v : JSON.stringify(v)));
      if (strVals.length) return strVals.join("; ");
    }
    return JSON.stringify(body);
  }

  form.addEventListener("submit", async (ev) => {
    ev.preventDefault();
    statusEl.textContent = "Ingresando...";
    statusEl.className = "";
    const data = Object.fromEntries(new FormData(form).entries());
    try {
      const resp = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      });
      if (!resp.ok) {
        let msg = "Error de login";
        try {
          const body = await resp.json();
          msg = stringifyError(body) || msg;
        } catch (e) {
          // fallback to status text
          msg = resp.statusText || msg;
        }
        statusEl.textContent = msg;
        statusEl.className = "err";
        return;
      }
      statusEl.textContent = "OK";
      statusEl.className = "ok";
      window.location.href = nextUrl;
    } catch (err) {
      statusEl.textContent = "No se pudo conectar al servidor";
      statusEl.className = "err";
    }
  });
</script>
{% endblock %}
