<div class="login-card modal-card">
  <div class="login-brand">
    <img src="/static/favicon.svg" alt="logo" width="40" height="40" />
    <h2>Compras</h2>
  </div>
  <p class="hint">Accede con tu cuenta para gestionar planes, stock y precios.</p>
  <form id="login-form" style="margin-top:12px">
    <div class="login-field">
      <label for="email">Email</label>
      <input class="login-input" type="email" id="email" name="email" required />
    </div>
    <div class="login-field">
      <label for="password">Contraseña</label>
      <input class="login-input" type="password" id="password" name="password" required />
    </div>
    <div class="login-field" style="display:flex;align-items:center;gap:8px;">
      <label style="display:flex;align-items:center;gap:6px;"><input type="checkbox" name="remember_me" id="remember_me" /> Recuérdame</label>
      <a href="#" style="margin-left:auto;font-size:13px;color:#6b7280;text-decoration:none">¿Olvidaste tu contraseña?</a>
    </div>
    <div class="login-actions">
      <button type="submit" class="btn-accion">Ingresar</button>
      <span id="login-status" class="login-status"></span>
    </div>
    <div class="login-footer">¿Olvidaste tu contraseña? Contacta al administrador.</div>
  </form>
</div>
